<!DOCTYPE html>
<html class="dark">

<head lang="en">
  <title>YGO Omega | Duelists Unite</title>
  <meta name="viewport" content="width=device-width">

  <link rel="dns-prefetch" href="//images.ygoprodeck.com">
  <link rel="dns-prefetch" href="//api.duelistsunite.org">
  <link rel="dns-prefetch" href="//discord.com">

  <!-- Critical assets will be preloaded by Vite automatically -->

<body class="bg-linear-to-b from-black via-zinc-900 to-zinc-900">
  <div id="root" class="min-h-full flex flex-col p-0 m-0">

  <script type="module" src="/src/main.tsx"></script>
